<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pragma Status</title>
    <link rel="preload" href="assets/status-bg.webp" as="image" />
    <link rel="stylesheet" href="styles.css?v=20260610-phase3-stale1" />
  </head>
  <body>
    <main class="shell">
      <nav class="top-actions" aria-label="页面入口">
        <a class="back-link" href="https://academic-ruc.cc/">‹ 返回总首页</a>
        <a class="admin-link" href="https://status-admin.academic-ruc.cc/dashboard" title="管理员登录后进入 Uptime Kuma 后台">管理后台</a>
      </nav>

      <section class="hero" aria-label="服务状态总览">
        <div class="hero-left">
          <div class="eyebrow">
            <span class="pulse-icon" aria-hidden="true">
              <img src="assets/ruc-logo-512.png" alt="" />
            </span>
            <span>GROUP VIEW</span>
          </div>
          <div class="title-row">
            <h1>Pragma</h1>
            <span class="badge">学术</span>
            <a class="external" href="https://pragma.academic-ruc.cc/" aria-label="打开主站">↗</a>
          </div>
          <div class="count-line">
            <span class="ok-dot"></span>
            <span id="normal-count">-- 正常</span>
            <span class="divider">|</span>
            <span id="total-count">8 个配置</span>
          </div>
        </div>

        <div class="hero-right">
          <div class="range-switch" aria-label="可用性区间">
            <span>可用性区间</span>
            <button class="range active" data-range="7">7 天</button>
            <button class="range" data-range="15">15 天</button>
            <button class="range" data-range="30">30 天</button>
          </div>
          <div class="overall" id="overall">
            <span class="ok-dot"></span>
            <span>OPERATIONAL</span>
          </div>
          <div class="meta-row">
            <span id="updated-at">更新于 --</span>
            <span class="divider">|</span>
            <span id="poll-label">60 秒轮询</span>
            <button id="refresh" class="refresh" type="button">刷新</button>
          </div>
        </div>
      </section>

      <section id="stale-banner" class="stale-banner hidden" aria-live="assertive"></section>
      <section id="notice" class="notice hidden" aria-live="polite"></section>
      <section id="cards" class="cards" aria-live="polite"></section>
    </main>

    <template id="card-template">
      <article class="card">
        <div class="card-head">
          <h2></h2>
          <span class="state-pill"></span>
        </div>
        <div class="provider-row">
          <span class="provider-icon"></span>
          <span class="provider-pill"></span>
          <span class="model-name"></span>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <span class="metric-label">↯ 对话延迟</span>
            <strong class="latency"></strong>
          </div>
          <div class="metric">
            <span class="metric-label">◌ 端点 PING</span>
            <strong class="ping"></strong>
          </div>
        </div>
        <div class="proxy-health hidden" aria-label="绑定出口状态">
          <span class="proxy-health-label">绑定出口</span>
          <div class="proxy-nodes"></div>
        </div>
        <div class="availability">
          <div>
            <span class="availability-label"></span>
            <small class="availability-count"></small>
          </div>
          <strong class="availability-rate"></strong>
        </div>
        <div class="history-block">
          <div class="history-top">
            <span>HISTORY (60PTS)</span>
            <span class="next-update">◷ NEXT UPDATE IN 0S</span>
          </div>
          <div class="bars"></div>
          <div class="history-axis">
            <span>PAST</span>
            <span>NOW</span>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js?v=20260610-phase3-stale1" defer></script>
  </body>
</html>
