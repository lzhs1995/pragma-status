# Pragma external GET probes — Phase 2 (status-resilience-v6)
# GET only, no API keys, interval >= 600s via workflowSchedule.uptime

owner: lzhs1995
repo: pragma-status

user-agent: lzhs1995

sites:
  - name: openai-default
    slug: openai-default
    url: https://pragma.academic-ruc.cc/v1/models
    expectedStatusCodes:
      - 200
      - 401
    maxResponseTime: 15000

  - name: gemini-default
    slug: gemini-default
    url: https://pragma.academic-ruc.cc/v1beta/models
    expectedStatusCodes:
      - 200
      - 401
    maxResponseTime: 15000

  - name: grok-video
    slug: grok-video
    url: https://video.academic-ruc.cc/v1/models
    expectedStatusCodes:
      - 200
      - 401
    maxResponseTime: 15000

  - name: pragma-chat
    slug: pragma-chat
    url: https://pragma.academic-ruc.cc/apps/chat
    expectedStatusCodes:
      - 200
      - 302
    maxResponseTime: 15000

  - name: pragma-image
    slug: pragma-image
    url: https://pragma.academic-ruc.cc/apps/images
    expectedStatusCodes:
      - 200
      - 302
    maxResponseTime: 15000

  - name: custom-status-shell
    slug: custom-status-shell
    url: https://lzhs1995.github.io/pragma-status/custom-status/
    expectedStatusCodes:
      - 200
    maxResponseTime: 15000

status-website:
  baseUrl: /pragma-status
  name: Pragma 外部探测
  logoUrl: https://raw.githubusercontent.com/lzhs1995/pragma-status/master/custom-status/assets/ruc-logo-512.png
  introTitle: "**Pragma** 外部基础设施可达性（Upptime GET 探测）"
  introMessage: |
    本页为 VPS 离线时 Worker fallback 的数据源之一；**不含** OpenAI/Gemini 对话链路探测。
    实时 Packy 状态页（含代理节点明细）见 [status.academic-ruc.cc](https://status.academic-ruc.cc/custom-status/)。
  navbar:
    - title: Upptime 摘要
      href: /
    - title: Packy 状态页
      href: /custom-status/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

workflowSchedule:
  uptime: "*/10 * * * *"
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * 0"
  updates: "0 3 * * *"

commitMessages:
  commitAuthorName: "pragma-status-bot"
  commitAuthorEmail: "pragma-status-bot@users.noreply.github.com"